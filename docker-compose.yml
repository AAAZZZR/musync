version: "3.9"
services:
  backend:
    build:
      context: ./backend
    container_name: musync-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: musync-frontend
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
